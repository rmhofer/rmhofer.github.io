<!-- file: _layouts.default.html -->
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <!-- Apply saved theme/font before paint to avoid a flash -->
    <script>
        (function () {
            try {
                // Default to light; only use dark if the visitor previously chose it.
                document.documentElement.setAttribute('data-theme', localStorage.getItem('theme') || 'light');
                document.documentElement.setAttribute('data-fonts', localStorage.getItem('fonts') || 'default');
            } catch (e) {}
        })();
    </script>
    <title>{{ page.title | default: site.title }} &middot; {{ site.title }}</title>
    <meta name="description" content="{{ site.description | strip_newlines }}">
    <meta name="author" content="Matthias Hofer">
    <link rel="canonical" href="{{ site.url }}{{ page.url }}">

    <!-- Open Graph / social preview -->
    <meta property="og:type" content="website">
    <meta property="og:title" content="{{ site.title }}">
    <meta property="og:description" content="{{ site.description | strip_newlines }}">
    <meta property="og:image" content="{{ site.url }}/assets/img/profile.jpg">
    <meta property="og:url" content="{{ site.url }}{{ page.url }}">
    <meta name="twitter:card" content="summary">

    <link rel="icon" href="/assets/img/profile.jpg">
    <link rel="stylesheet" type="text/css" href="/assets/css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"
          referrerpolicy="no-referrer">
</head>

<body>
    <div class="wrapper">
        <div class="sidebar"> <!-- page navigation -->
            <img src="/assets/img/profile.jpg" alt="Matthias Hofer" class="profile-pic">
            <div class="nametag">
                <a href="#about">Matthias R. Hofer</a>
            </div>
            <ul>
                <li><a href="#news">News</a></li>
                <li><a href="#papers">Papers</a></li>
                <li><a href="#research">Research</a></li>
                <li><a href="#code">Code &amp; Demos</a></li>
            </ul>
            <!-- Social Links -->
            <div class="social-links">
                <a href="https://scholar.google.com/citations?hl=en&user=9L864oYAAAAJ" class="social-icon" target="_blank" rel="noopener" aria-label="Google Scholar" title="Google Scholar"><i class="fas fa-graduation-cap"></i></a>
                <a href="https://orcid.org/0000-0002-6239-5488" class="social-icon" target="_blank" rel="noopener" aria-label="ORCID" title="ORCID"><i class="fab fa-orcid"></i></a>
                <a href="https://github.com/rmhofer" class="social-icon" target="_blank" rel="noopener" aria-label="GitHub" title="GitHub"><i class="fab fa-github"></i></a>
                <a class="social-icon" aria-label="Email" title="Email"><i class="fas fa-envelope"></i></a>
            </div>
        </div>
        <div class="main-content">
            {{ content }} <!-- main page content -->
        </div>
    </div>

    <footer class="site-footer">
        <div class="site-footer-inner">
            <span class="footer-note">&copy; {{ site.time | date: "%Y" }} Matthias Hofer<span class="footer-updated"> &middot; updated {{ site.time | date: "%B %Y" }}</span></span>
            <div class="footer-toggles">
                <button id="font-toggle" class="footer-btn" type="button" aria-label="Switch font set" title="Switch fonts"><i class="fas fa-font"></i></button>
                <button id="theme-toggle" class="footer-btn" type="button" aria-label="Toggle dark mode" title="Toggle dark mode"><i class="fas fa-moon"></i></button>
            </div>
        </div>
    </footer>

    <script type="text/javascript">
        document.querySelectorAll('a[href^="#"]').forEach(anchor => {
            anchor.addEventListener('click', function (e) {
                e.preventDefault();

                document.querySelector(this.getAttribute('href')).scrollIntoView({
                    behavior: 'smooth'
                });
            });
        });

        (function() {
        function decode() {
            var parts = ['it.', 'r@m', 'u', 'mh', 'ed', 'ofe'];
            var shuffled = [parts[3], parts[5], parts[1], parts[0], parts[4], parts[2]];
            var someContent = shuffled.join('');
            var slot = document.querySelector('.some_content');
            if (slot) { slot.textContent = someContent; }
            var mail = document.querySelector('.social-icon[aria-label="Email"]');
            if (mail) { mail.setAttribute('href', 'mailto:' + someContent); }
        }

        // Decode and display
        decode();
        })();

        // Theme + font toggles (footer)
        (function () {
            var root = document.documentElement;
            var themeBtn = document.getElementById('theme-toggle');
            var fontBtn = document.getElementById('font-toggle');

            function paintThemeIcon() {
                var dark = root.getAttribute('data-theme') === 'dark';
                themeBtn.innerHTML = dark ? '<i class="fas fa-sun"></i>' : '<i class="fas fa-moon"></i>';
                themeBtn.title = dark ? 'Switch to light mode' : 'Switch to dark mode';
            }

            themeBtn.addEventListener('click', function () {
                var next = root.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
                root.setAttribute('data-theme', next);
                try { localStorage.setItem('theme', next); } catch (e) {}
                paintThemeIcon();
            });

            fontBtn.addEventListener('click', function () {
                var next = root.getAttribute('data-fonts') === 'alt' ? 'default' : 'alt';
                root.setAttribute('data-fonts', next);
                try { localStorage.setItem('fonts', next); } catch (e) {}
            });

            paintThemeIcon();
        })();
    </script>
</body>

</html>
